            background-repeat: no-repeat;

        #accbtn {

        .farematrix h1 {

            line-height: 65px;

        }

        .farecontainer {
            display: flex;
            justify-content: space-between;
            margin-left: 50px;
        }

        .fareresult {
            width: 600px;
            margin-top: 25px;
            margin-right: 50px;
            background-color: #16191cb5;
            border-radius: 50px;
            box-shadow: -2px -1px 13px 0px rgba(0, 0, 0, 0.53);
            -webkit-box-shadow: -2px -1px 13px 0px rgba(0, 0, 0, 0.454);
            -moz-box-shadow: -2px -1px 13px 0px rgba(0, 0, 0, 0.75);

            transition: transform 0.3s ease;

        .fareresult h1 {
            margin-top: 10px;
            font-family: 'Cubao';
            font-size: 90px;
            color: greenyellow;
            text-shadow: 2px 2px 7px #0000009c;
        }

            margin-top: 90px;
            font-size: 90px;
            font-family: 'Poppins';
            color: white;
        }

    </style>
</head>

<body>

    <!-- Navbar
    Source: 2Q Project -->

    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent">
        <div class="container-fluid">
            <div class="navbar-collapse">

                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a href="index.html"><img src="Pasabay Logo.png" alt=""></a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="farematrix.html">Fare Matrix</a></li>
                    <li class="nav-item"><a class="nav-link" href="schedule.html">Schedule</a></li>
                    <li class="nav-item"><a class="nav-link" href="help.html">Help</a></li>
                </ul>

                <a href="farematrix.html"><button type="button" id="bookbtn">Book Now</button></a>
                <a href="registration.html"><button type="button" id="accbtn">Create Account</button></a>

            </div>
        </div>
    </nav>

    <div class="farecontainer">

        <div class="farematrix">
            <h1><span>Pasabay</span><br>Fare Matrix</h1>

            <form>
                <div class="pickup">
                    <label>Pick-Up Location</label><br>
                    <select id="pickup">
                        <option value="0">Santolan</option>
                        <option value="1.2">Katipunan</option>
                        <option value="2.4">Anonas</option>
                        <option value="3.6">Araneta Center-Cubao</option>
                        <option value="4.8">Betty Go-Belmonte</option>
                        <option value="6.0">Gilmore</option>
                        <option value="7.2">J. Ruiz</option>
                        <option value="8.4">V. Mapa</option>
                        <option value="9.6">Pureza</option>
                        <option value="10.8">Legarda</option>
                        <option value="12.0">Recto</option>
                    </select>
                </div>

                <div class="dropoff">
                    <label>Drop-Off Location</label><br>
                    <select id="dropoff">
                        <option value="0">Santolan</option>
                        <option value="1.2">Katipunan</option>
                        <option value="2.4">Anonas</option>
                        <option value="3.6">Araneta Center-Cubao</option>
                        <option value="4.8">Betty Go-Belmonte</option>
                        <option value="6.0">Gilmore</option>
                        <option value="7.2">J. Ruiz</option>
                        <option value="8.4">V. Mapa</option>
                        <option value="9.6">Pureza</option>
                        <option value="10.8">Legarda</option>
                        <option value="12.0">Recto</option>
                    </select>
                </div>

                <button type="button" id="regfare">Regular Fare</button><br>
                <button type="button" id="discfare">Discounted Fare</button>
            </form>
        </div>

        <div class="fareresult">
            <h1>Fare:</h1>
            <p id="displayfare">?</p>
        </div>

    </div>

    <footer>
        <p>David, Llaguno, Saludes | 9-Jade © 2026</p>
    </footer>

    <script>
        // Fare Calculator (Source: Sir Renn)
        function calculateFare(discountRate) {
            let pickup = parseFloat(document.getElementById("pickup").value);
            let dropoff = parseFloat(document.getElementById("dropoff").value);

            let basefare = 50;
            let perKMrate = 15;
            let baseKM = 2;

            let distance = Math.max(Math.abs(dropoff - pickup), 0);
            let extraKM = Math.max(distance - baseKM, 0);

            let fare = basefare + extraKM * perKMrate;
            fare = fare * discountRate;

            document.getElementById("displayfare").innerHTML = fare.toFixed(2) + " PHP";
        }

        document.getElementById("regfare").onclick = function () {
            calculateFare(1);
        };

        document.getElementById("discfare").onclick = function () {
            calculateFare(0.8);
        };
    </script>

</body>
