<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasabay: Registration</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="Pasabay Logo.png">

    <style>

        /* Custom Font (Acquired from befonts.com) */
        @font-face {
            font-family: 'Cubao-L';
            src: url(Cubao_Free_Narrow.otf);
        }

        @font-face {
            font-family: 'Cubao';
            src: url(Cubao_Free_Regular.otf);
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: url(BG5.png);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        nav {
            font-family: 'Cubao-L';
            font-size: 30px;
        }

        .nav-item {
            margin-left: 10px;
        }

        .nav-item img {
            margin-top: 12px;
            width: 35px;
        }

        #hero:hover {
            cursor: pointer;
            transform: translateY(-10px);
        }

        #accbtn {
            width: 200px;
            padding: 5px;
            border: none;
            border-radius: 20px;
            background-color: white;
            color: #212529;
        }

        #bookbtn {
            margin-right: 15px;
            border: none;
            background-color: transparent;
            color: white; 
            transition: transform 0.4s ease;
        }

        #bookbtn:hover {
            transform: scale(1.06)
        }

        .confirmation {
            display: block;
            margin: auto;
            width: 800px;
            height: auto;
            background-color: #16191cb5;
            border-radius: 50px;
            font-family: 'Poppins';
            /* Used box shadow generator (Source Given in Line 2) */
            box-shadow: -2px -1px 13px 0px rgba(0, 0, 0, 0.53);
            -webkit-box-shadow: -2px -1px 13px 0px rgba(0, 0, 0, 0.454);
            -moz-box-shadow: -2px -1px 13px 0px rgba(0, 0, 0, 0.75);
        }

        .confirmation h1 {
            padding-top: 50px;
            font-family: 'Cubao';
            font-size: 90px;
            color: greenyellow;
            text-align: center;
            text-shadow: 2px 2px 7px #0000009c;
        }
        .confirmation p, #details-h {
            text-align: center;
            font-size: 25px;
            color: white;
        }
        #details-h {
            font-weight: 700;
            margin-bottom: 50px;
        }
        #instructions {
            margin-top: -40px;
            margin-bottom: 50px;
            font-weight: 700;
            text-align: center;
            font-size: 20px;
            color: rgb(255, 98, 0);  
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent">
        <div class="container-fluid">
            <div class="navbar-collapse">

                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a href="index.html"><img src="Pasabay Logo.png" alt=""></a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="farematrix.html">Fare Matrix</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Schedule</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Help</a></li>
                </ul>

                <a href="farematrix.html"><button type="button" id="bookbtn">Book Now</button></a>
                <a href="registration.html"><button type="button" id="accbtn">Create Account</button></a>

            </div>
        </div>
    </nav>

    <div class="confirmation">
        <h1>Success!</h1>
        <p>Your account has successfuly been created!</p>

        <details class="ontoggle">
            <summary id="details-h">Click here to verify your e-mail!</summary>
            <p id="instructions"></p>
        </details>

    </div>

    <footer>
        <p>David, Llaguno, Saludes | 9-Jade © 2026</p>
    </footer>

    <script>
        var instructionsText = "Verify your email";
        document.getElementById("instructions").innerHTML = instructionsText;
    </script>
</body>
</html>
