<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasabay: Registration</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="Pasabay Logo.png">

    <style>

        /* Custom Font (Acquired from befonts.com) */
        @font-face {
            font-family: 'Cubao-L';
            src: url(Cubao_Free_Narrow.otf);
        }

        @font-face {
            font-family: 'Cubao';
            src: url(Cubao_Free_Regular.otf);
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: url(BG5.png);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        nav {
            font-family: 'Cubao-L';
            font-size: 30px;
        }

        .nav-item {
            margin-left: 10px;
        }

        .nav-item img {
            margin-top: 12px;
            width: 35px;
        }

        #accbtn {
            width: 200px;
            padding: 5px;
            border: none;
            border-radius: 20px;
            background-color: white;
            color: #212529;
        }

        #bookbtn {
            margin-right: 15px;
            border: none;
            background-color: transparent;
            color: white; 
            transition: transform 0.4s ease;
        }

        #bookbtn:hover {
            transform: scale(1.06)
        }

        footer {
            width: 100%;
            height: 45px;
            margin-top: auto;
            padding-top: 11px;
            background-color: #212529ae;
            font-family: 'Poppins';
            font-size: 17px;
            color: white;
            text-align: center;
        }

        .farematrix h1 {
            margin-top: 50px;
            line-height: 65px;
            font-size: 70px;
            font-family: 'Cubao';
            color: rgb(255, 98, 0);
            text-shadow: 2px 2px 7px #0000009c;
            transition: transform 0.4s ease;
        }

        .farematrix h1 span {
            font-size: 120px;
            color: greenyellow;
        }

        .farematrix h1:hover {
            transform: translateY(-10px);
        }

        .profile {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 500px;
            height: 350px;
            background-color: #16191cb5;
            border-radius: 50px;
            font-family: 'Poppins';
            /* Used box shadow generator (Source Given in Line 2) */
            box-shadow: -2px -1px 13px 0px rgba(0, 0, 0, 0.53);
            -webkit-box-shadow: -2px -1px 13px 0px rgba(0, 0, 0, 0.454);
            -moz-box-shadow: -2px -1px 13px 0px rgba(0, 0, 0, 0.75);
        }

        #pfp {
            display: block;
            margin: auto;
            width: 170px;
            height: 170px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: -2px -1px 13px 0px rgba(0, 0, 0, 0.605);
        }

        .profile label {
            margin-top: 10px;
            font-family: 'Poppins';
            color: white;
        }

        .profile input {
            margin-top: 20px;
            width: 450px;
        }

        .profile button {
            width: 450px;
            min-height: 40px;
            margin-bottom: 8px;
            padding-left: 10px;
            border-radius: 10px;
            border: none;
            background-color: rgb(255, 98, 0);
            color: white;
            font-family: 'Poppins';
            font-weight: 600;
            text-shadow: 1px 1px 3px #00000047;
        }

        .accform {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 800px;
            height: 530px;
            margin-top: 25px;
            margin-right: 50px;
            background-color: #16191cb5;
            border-radius: 50px;
            font-family: 'Poppins';
            transition: transform 0.3s ease;
            /* Used box shadow generator (Source Given in Line 2) */
            box-shadow: -2px -1px 13px 0px rgba(0, 0, 0, 0.53);
            -webkit-box-shadow: -2px -1px 13px 0px rgba(0, 0, 0, 0.454);
            -moz-box-shadow: -2px -1px 13px 0px rgba(0, 0, 0, 0.75);
        }

        .accform h1 {
            margin-top: 10px;
            font-family: 'Cubao';
            font-size: 90px;
            color: greenyellow;
            text-align: center;
            text-shadow: 2px 2px 7px #0000009c;
        }

        .accform label {
            color: white;
            text-align: left;
        }

        .accform button {
            width: 100%;           
            margin-top: 20px;    
            padding: 12px;
            border-radius: 10px;
            border: none;
            background-color: rgb(255, 98, 0);
            color: white;
            font-family: 'Poppins';
            font-weight: 600;
            text-shadow: 1px 1px 3px #00000047;
        }

        .farecontainer {
            display: flex;
            justify-content: space-between;
            margin-left: 50px;
        }

    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent">
        <div class="container-fluid">
            <div class="navbar-collapse">

                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a href="index.html"><img src="Pasabay Logo.png" alt=""></a></li>
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="farematrix.html">Fare Matrix</a></li>
                    <li class="nav-item"><a class="nav-link" href="schedule.html">Schedule</a></li>
                    <li class="nav-item"><a class="nav-link" href="help.html">Help</a></li>
                </ul>

                <a href="farematrix.html"><button type="button" id="bookbtn">Book Now</button></a>
                <a href="registration.html"><button type="button" id="accbtn">Create Account</button></a>

            </div>
        </div>
    </nav>

    <div class="farecontainer">

        <div class="farematrix">
            <h1><span>Pasabay</span><br>REGISTRATION</h1>
        
            <div class="profile">
                <div id="pfp-container">
                    <img src="https://i.pinimg.com/736x/46/82/7d/46827ddfea1035901b006b655b08955a.jpg" alt="" id="pfp">
                </div>

                <label>Profile Picture</label>
                <input type="file" class="form-control mb-2" required>
                <button type="button" onclick="changeImage()" class="confirm btn-display">Confirm Image</button>
            </div>
        </div>

        <div class="accform">
            <h1>Account Form</h1>

            <form>
                <div class="row justify-content-center px-4">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">First Name</label>
                        <input type="text" class="form-control" placeholder="First Name" required>
                    </div>
                    
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="form-control" placeholder="Last Name" required>
                    </div>

                    <div class="col-md-2 mb-3">
                        <label class="form-label">Age</label>
                        <input type="number" class="form-control" placeholder="Age" required>
                    </div>

                    <div class="col-md-5 mb-3">
                        <label class="form-label">Contact Number</label>
                        <input type="tel" class="form-control" placeholder="0123-456-6767" required>
                    </div>
                    
                    <div class="col-md-5 mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" placeholder="zarloscky@gmail.com" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" placeholder="zarloscky" required>
                    </div>
                    
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" required>
                    </div>

                    <div class="col-12">
                        <button type="button" class="mt-4" onclick="window.location.href='confirmation.html'">Create Account</button>
                    </div>
                </div>
            </form>
        </div>

    </div>

    <footer>
        <p>David, Llaguno, Saludes | 9-Jade © 2026</p>
    </footer>

    <script>
        // Profile Picture Code (Source: 3Q Skills Test)

        // Assigning Variables
        var pfpContainer = document.getElementById("pfp-container"); // PFP container
        var instructions = document.getElementById("instructions"); // Instructions container

        var defaultPfp = "https://i.pinimg.com/736x/46/82/7d/46827ddfea1035901b006b655b08955a.jpg"; // Old profile pic
        var newPfp = "https://i.pinimg.com/736x/07/31/a4/0731a4b832f46ae6e078dd9cfed922c1.jpg"; // New profile pic

        var instructionsText = "Please fill out all required fields in the registration form with accurate information. Once completed, review your details and click Submit to finish your registration.";

        // Setup
        if(instructions) {
            instructions.innerHTML = instructionsText;
        }

        // Function
        function changeImage() {
            pfpContainer.innerHTML = '<img src="' + newPfp + '" width="200" id="pfp">'; // Changes from old PFP to new PFP by using innerHTML and concatenation
            window.alert("Your profile picture has been changed!"); // Alerts the user once the profile picture has been updated
        }
    </script>
</body>
</html>
